!
! Sample Cisco FTD Configuration
! Used for educational firewall review examples
!

Cisco Firepower Extensible Operating System (FX-OS) v2.16.0 (build 4006)
Cisco Firepower 1150 Threat Defense v7.6.2 (build 329)
NGFW Version 7.6.2

hostname FW-EDGE-01

!
! VPN Pools
!

ip local pool ANYCONNECT_POOL 10.100.100.10-10.100.101.250 mask 255.255.254.0
ip local pool MGMT_VPN_POOL 192.168.100.10-192.168.101.250 mask 255.255.254.0

!
! Interfaces
!

interface Port-channel1
 no nameif
 no security-level
 no ip address

interface Port-channel1.100
 description INTERNET
 vlan 100
 nameif INTERNET
 security-level 0
 ip address 203.0.113.10 255.255.255.248

!
! Corporate Networks
!

interface Port-channel1.200
 description CORPORATE_USERS
 vlan 200
 nameif CORP_USERS
 security-level 100
 ip address 10.10.10.1 255.255.255.0

interface Port-channel1.210
 description CORPORATE_SERVERS
 vlan 210
 nameif CORP_SERVERS
 security-level 100
 ip address 10.10.20.1 255.255.255.0

interface Port-channel1.220
 description CORPORATE_WIFI
 vlan 220
 nameif CORP_WIFI
 security-level 100
 ip address 10.10.30.1 255.255.255.0

!
! DMZ Networks
!

interface Port-channel1.300
 description DMZ_WEB
 vlan 300
 nameif DMZ_WEB
 security-level 50
 ip address 172.16.10.1 255.255.255.0

interface Port-channel1.310
 description DMZ_APPLICATION
 vlan 310
 nameif DMZ_APP
 security-level 50
 ip address 172.16.20.1 255.255.255.0

interface Port-channel1.500
 description MANAGEMENT
 vlan 500
 nameif MGMT
 security-level 100
 ip address 10.99.99.1 255.255.255.0

interface Management1/1
 management-only
 nameif management

!
! Site to Site VPNs
!

interface Tunnel1
 description AZURE-VTI-PRIMARY
 nameif AZURE-VTI-PRIMARY
 ip address 169.254.100.1 255.255.255.252
 tunnel source interface INTERNET
 tunnel destination 20.50.100.10
 tunnel mode ipsec ipv4

interface Tunnel2
 description AWS-VTI
 nameif AWS-VTI
 ip address 169.254.200.1 255.255.255.252
 tunnel source interface INTERNET
 tunnel destination 52.95.10.10
 tunnel mode ipsec ipv4

interface Tunnel3
 description LEGACY-PARTNER-VPN
 shutdown
 nameif PARTNER-VPN
 ip address 192.0.2.1 255.255.255.252
 tunnel source interface INTERNET
 tunnel mode ipsec ipv4

!
! DNS
!

dns server-group CORP_DNS
 name-server 10.10.10.10
 name-server 10.10.10.11

!
! Network Objects
!

object network CORP-NET
 subnet 10.10.10.0 255.255.255.0

object network MGMT-NET
 subnet 10.99.99.0 255.255.255.0

object network DMZ-FE
 subnet 172.16.10.0 255.255.255.0

object network DMZ-BE
 subnet 172.16.20.0 255.255.255.0

object network WEB-SERVER
 host 172.16.10.100

object network JUMP-HOST
 host 10.99.99.50

object network DOMAIN-CONTROLLER
 host 10.10.10.20

object network AZURE-NET
 subnet 10.200.0.0 255.255.0.0

!
! Object Groups
!

object-group network CORPORATE-NETS
 network-object object CORP-NET

object-group network MANAGEMENT-NETS
 network-object object MGMT-NET

object-group network DMZ-NETS
 network-object object DMZ-FE
 network-object object DMZ-BE

object-group network CLOUD-NETS
 network-object object AZURE-NET

!
! AAA
!

aaa-server TACACS protocol tacacs+
aaa-server TACACS (MGMT) host 10.99.99.100

aaa-server RADIUS protocol radius
aaa-server RADIUS (MGMT) host 10.99.99.110

saml identity-provider https://login.microsoftonline.com

object network TACACS-SERVER
 host 10.99.99.100

object network RADIUS-SERVER
 host 10.99.99.110

object network ISE-PRIMARY
 host 10.99.99.120

!
! Monitoring
!

snmp-server enable

snmp-server host MGMT 10.99.99.200

object network SOLARWINDS
 host 10.99.99.200

!
! Logging
!

logging enable

logging host MGMT 10.99.99.210

object network SYSLOG-SERVER
 host 10.99.99.210

!
! Security Zones
!

object-group interface INTERNET_ZONE security-zone
 interface-object interface-name INTERNET

object-group interface CORPORATE_ZONE security-zone
 interface-object interface-name CORP_USERS
 interface-object interface-name CORP_SERVERS
 interface-object interface-name CORP_WIFI

object-group interface DMZ_ZONE security-zone
 interface-object interface-name DMZ_WEB
 interface-object interface-name DMZ_APP

object-group interface MANAGEMENT_ZONE security-zone
 interface-object interface-name MGMT

object-group interface CLOUD_VPN_ZONE security-zone
 interface-object interface-name AZURE-VTI-PRIMARY
 interface-object interface-name AWS-VTI

!
! Management Access
!

ssh 10.99.99.0 255.255.255.0 MGMT
ssh 10.10.10.0 255.255.255.0 MGMT

!
! WebVPN
!

ssl cipher tlsv1.2 custom
webvpn
 enable INTERNET
 hsts-server
 content-security-policy

!
! Routing
!

router bgp 65001

!
! NAT
!

nat (CORPORATE,INTERNET) source dynamic any interface

object network WEB-SERVER
 host 172.16.10.100
 nat (DMZ,INTERNET) static interface

!
! Access Control Lists
!

access-list FW_ACL extended permit tcp any object WEB-SERVER eq 443

access-list FW_ACL extended permit tcp any object-group DMZ-NETS eq 443

access-list FW_ACL extended permit tcp object-group CORPORATE-NETS any eq 80

access-list FW_ACL extended permit tcp object-group CORPORATE-NETS any eq 443

access-list FW_ACL extended permit tcp object JUMP-HOST object DOMAIN-CONTROLLER eq 3389

access-list FW_ACL extended permit ip object-group CLOUD-NETS object-group CORPORATE-NETS

access-list FW_ACL extended permit gre any any

access-list FW_ACL extended permit ip any any

access-list FW_ACL extended deny ip any any

!
! Control Plane Protection
!

access-group CONTROL_PLANE_BLOCK in interface INTERNET control-plane

!
! End of Configuration
!