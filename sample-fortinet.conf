!
! Network Architecture
!

config system interface
    edit "wan1"
        set ip 203.0.113.10/29
        set role wan
        set allowaccess ping https ssh
    next

    edit "corp"
        set ip 10.10.10.1/24
        set role lan
    next

    edit "server"
        set ip 10.20.20.1/24
        set role lan
    next

    edit "dmz"
        set ip 10.30.30.1/24
        set role dmz
    next

    edit "mgmt"
        set ip 10.99.99.1/24
        set role lan
        set allowaccess ping https ssh snmp
    next
end

!
! Security Zones
!

config system zone

    edit "CORPORATE_ZONE"
        set interface "corp" "server"
    next

    edit "DMZ_ZONE"
        set interface "dmz"
    next

    edit "VPN_ZONE"
        set interface "wan1"
    next

end

!
! Address Objects
!

config firewall address

    edit "DC01"
        set subnet 10.20.20.10 255.255.255.255
    next

    edit "WEB01"
        set subnet 10.30.30.20 255.255.255.255
    next

    edit "SQL01"
        set subnet 10.20.20.50 255.255.255.255
    next

    edit "UNUSED-SERVER"
        set subnet 10.20.20.99 255.255.255.255
    next

end

!
! Address Groups
!

config firewall addrgrp
    edit "DOMAIN_CONTROLLERS"
        set member "DC01"
    next
end

!
! Service Groups
!

config firewall service group
    edit "ADMIN_SERVICES"
        set member "LDAP" "HTTPS" "SSH"
    next
end

!
! Active VPN
!

config vpn ipsec phase1-interface

    edit "AZURE-PROD"
        set interface "wan1"
        set remote-gw 40.100.100.1
        set ike-version 2
    next
end

config vpn ipsec phase2-interface
    edit "AZURE-PROD-P2"
        set phase1name "AZURE-PROD"
        set src-subnet 10.10.10.0 255.255.255.0
        set dst-subnet 10.50.50.0 255.255.255.0
    next
end

!
! Disabled VPN
!

config vpn ipsec phase1-interface

    edit "OLD-PARTNER"
        set interface "wan1"
        set remote-gw 198.51.100.10
        set comments "DECOMMISSIONED"
        set status disable
    next

end

!
! SSL VPN
!

config vpn ssl settings
    set port 443
end

!
! AAA
!

config user radius

    edit "RADIUS-PROD"
        set server "10.99.99.100"
    next

end

config user ldap

    edit "LDAP-UNUSED"
        set server "10.99.99.200"
    next

end

!
! Admin Account
!

config system admin
    edit "admin-radius"
        set remote-auth enable
    next
end

!
! Logging
!

config log syslogd setting

    set status enable
    set server "10.99.99.210"

end

!
! Monitoring
!

config system snmp community

    edit 1
        set name "Monitoring"
        config hosts
            edit 1
                set ip 10.99.99.220 255.255.255.255
            next
        end
    next

end

!
! NAT
!

config firewall vip

    edit "WEB01-PUBLIC"
        set extip 203.0.113.100
        set mappedip "10.30.30.20"
    next

end

!
! Policies
!

config firewall policy

    edit 1
        set srcintf "corp"
        set dstintf "server"
        set srcaddr "all"
        set dstaddr "DC01"
        set service "LDAP"
        set action accept
    next

    edit 2
        set srcintf "corp"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
    next

    edit 3
        set status disable
        set srcintf "corp"
        set dstintf "server"
        set srcaddr "all"
        set dstaddr "SQL01"
        set service "HTTPS"
        set action accept
    next

end

!
! Local Admin Access on WAN
!

edit "wan1"
    set allowaccess ping https ssh
